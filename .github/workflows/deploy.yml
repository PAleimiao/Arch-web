name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          pnpm install
        timeout-minutes: 10

      - name: Remove large files (Cloudflare Pages limit: 25MB)
        run: |
          find public -type f -size +25M -exec rm -f {} \;
          rm -f public/videos/*.mp4 2>/dev/null || true

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Remove large files from dist
        run: |
          find dist -type f -size +25M -exec rm -f {} \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=arch-web
