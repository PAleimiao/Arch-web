name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove lock file and install
        run: |
          rm -f package-lock.json
          npm install

      - name: Remove large files (Cloudflare Pages limit: 25MB)
        run: |
          # Find and remove files larger than 25MB
          find public -type f -size +25M -exec rm -f {} \;
          find dist -type f -size +25M -exec rm -f {} \; 2>/dev/null || true
          # Also check videos folder
          rm -f public/videos/*.mp4 2>/dev/null || true

      - name: Build
        run: ./node_modules/.bin/vite build --emptyOutDir
        env:
          NODE_ENV: production

      - name: Remove large files from dist
        run: |
          find dist -type f -size +25M -exec rm -f {} \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=arch-web
